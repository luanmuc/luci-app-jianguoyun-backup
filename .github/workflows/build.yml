name: Build OpenWrt Packages

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      openwrt_version:
        description: 'OpenWrt Version'
        required: false
        default: 'all'
        type: choice
        options:
          - 'all'
          - '24.10'
          - '25.12'
  
  # 定时触发（每周日凌晨2点）
  schedule:
    - cron: '0 2 * * 0'
  
  # 推送代码时触发
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'

env:
  PLUGIN_NAME: luci-app-jianguoyun-backup
  PLUGIN_VERSION: 1.0.0

jobs:
  build:
    name: Build ${{ matrix.pkg_format }} for OpenWrt ${{ matrix.openwrt_version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # OpenWrt 24.10 - IPK 格式（传统 opkg）
          - openwrt_version: '24.10'
            pkg_format: 'ipk'
            sdk_url: 'https://downloads.openwrt.org/releases/24.10.7/targets/x86/64/openwrt-sdk-24.10.7-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst'
            use_apk: 'n'
          
          # OpenWrt 25.12 - APK 格式（新包管理器）
          - openwrt_version: '25.12'
            pkg_format: 'apk'
            sdk_url: 'https://downloads.openwrt.org/releases/25.12.4/targets/x86/64/openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst'
            use_apk: 'y'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            file \
            g++ \
            gawk \
            gettext \
            git \
            libelf-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libssl-dev \
            python3 \
            python3-setuptools \
            python3-pyelftools \
            unzip \
            wget \
            rsync \
            subversion \
            time \
            xsltproc \
            zlib1g-dev \
            zstd

      - name: Download OpenWrt SDK
        id: download_sdk
        run: |
          echo "Downloading OpenWrt ${{ matrix.openwrt_version }} SDK..."
          wget -q ${{ matrix.sdk_url }} -O openwrt-sdk.tar.zst
          
          if [ $? -ne 0 ]; then
            echo "SDK download failed!"
            exit 1
          fi
          
          echo "Extracting SDK..."
          tar --zstd -xf openwrt-sdk.tar.zst
          SDK_DIR=$(ls -d openwrt-sdk-* 2>/dev/null | head -1)
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          echo "SDK directory: $SDK_DIR"
          
          # 验证SDK
          ls -la $SDK_DIR/

      - name: Prepare plugin source
        run: |
          # 创建软件包目录
          mkdir -p ${{ env.SDK_DIR }}/package/${{ env.PLUGIN_NAME }}
          
          # 复制插件源码到SDK的package目录
          cp -r Makefile luasrc root ${{ env.SDK_DIR }}/package/${{ env.PLUGIN_NAME }}/
          
          # 显示目录结构
          echo "Plugin source structure:"
          ls -laR ${{ env.SDK_DIR }}/package/${{ env.PLUGIN_NAME }}/

      - name: Update feeds
        run: |
          cd ${{ env.SDK_DIR }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Configure build
        run: |
          cd ${{ env.SDK_DIR }}
          
          # 设置包格式
          echo "CONFIG_USE_APK=${{ matrix.use_apk }}" >> .config
          
          # 启用插件（编译为模块）
          echo "CONFIG_PACKAGE_${{ env.PLUGIN_NAME }}=m" >> .config
          
          # 生成默认配置
          make defconfig
          
          # 验证配置
          echo "Build configuration:"
          grep -E "(CONFIG_USE_APK|CONFIG_PACKAGE_${{ env.PLUGIN_NAME }})" .config

      - name: Build plugin
        id: build
        run: |
          cd ${{ env.SDK_DIR }}
          
          echo "Starting build for ${{ matrix.pkg_format }} format..."
          echo "Using ${{ matrix.openwrt_version }} SDK..."
          
          # 编译插件
          make package/${{ env.PLUGIN_NAME }}/compile V=s -j$(nproc)
          
          if [ $? -eq 0 ]; then
            echo "Build successful!"
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "Build failed!"
            echo "build_status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Find package files
        run: |
          cd ${{ env.SDK_DIR }}
          
          echo "Finding package files..."
          echo "Looking for ${{ matrix.pkg_format }} files..."
          
          # 查找生成的包文件
          if [ "${{ matrix.pkg_format }}" = "ipk" ]; then
            find bin -name "*.ipk" -type f 2>/dev/null || echo "No ipk files found"
          else
            find bin -name "*.apk" -type f 2>/dev/null || echo "No apk files found"
          fi
          
          # 创建输出目录
          mkdir -p ${{ github.workspace }}/output
          
          # 复制包文件
          if [ "${{ matrix.pkg_format }}" = "ipk" ]; then
            find bin -name "${{ env.PLUGIN_NAME }}*.ipk" -type f -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          else
            find bin -name "${{ env.PLUGIN_NAME }}*.apk" -type f -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          fi
          
          # 列出输出文件
          echo "Output files:"
          ls -la ${{ github.workspace }}/output/ || echo "No output files"
          
          # 检查文件数量
          FILE_COUNT=$(ls -1 ${{ github.workspace }}/output/*.${{ matrix.pkg_format }} 2>/dev/null | wc -l)
          echo "Found $FILE_COUNT package files"
          
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "ERROR: No package files generated!"
            exit 1
          fi

      - name: Verify package
        run: |
          cd ${{ github.workspace }}/output
          
          echo "Verifying package..."
          
          for pkg in *.${{ matrix.pkg_format }}; do
            echo "Package: $pkg"
            echo "Size: $(du -h "$pkg" | cut -f1)"
            
            if [ "${{ matrix.pkg_format }}" = "ipk" ]; then
              # 验证ipk包（ar格式）
              echo "IPK contents:"
              ar t "$pkg" 2>/dev/null || echo "Cannot list ipk contents"
            else
              # 验证apk包
              echo "APK info:"
              file "$pkg" 2>/dev/null || echo "Cannot determine file type"
            fi
            
            echo "---"
          done

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}_${{ matrix.openwrt_version }}_${{ matrix.pkg_format }}_all
          path: output/*.${{ matrix.pkg_format }}
          if-no-files-found: error
          retention-days: 90

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          
      - name: Prepare release files
        run: |
          mkdir -p release
          
          # 整理所有包文件
          find artifacts -name "*.ipk" -o -name "*.apk" -type f | while read file; do
            cp "$file" release/
          done
          
          # 生成文件列表
          echo "## 安装包列表" > release/RELEASE_NOTES.md
          echo "" >> release/RELEASE_NOTES.md
          echo "### OpenWrt 24.10 (IPK 格式)" >> release/RELEASE_NOTES.md
          echo "" >> release/RELEASE_NOTES.md
          ls -1 release/*.ipk 2>/dev/null | while read f; do
            echo "- $(basename "$f")" >> release/RELEASE_NOTES.md
          done
          echo "" >> release/RELEASE_NOTES.md
          echo "### OpenWrt 25.12 (APK 格式)" >> release/RELEASE_NOTES.md
          echo "" >> release/RELEASE_NOTES.md
          ls -1 release/*.apk 2>/dev/null | while read f; do
            echo "- $(basename "$f")" >> release/RELEASE_NOTES.md
          done
          
          echo ""
          echo "Release files:"
          ls -la release/

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*
          generate_release_notes: true
          body_path: release/RELEASE_NOTES.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
