name: Build OpenWrt 25.12 APK

# 权限声明
permissions:
  contents: write  # 发布 Release 需要写权限
  packages: read
  actions: read

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: false
        default: 'normal'
        type: choice
        options:
          - 'normal'
          - 'release'
  
  # 定时触发（每周日凌晨2点）
  schedule:
    - cron: '0 2 * * 0'
  
  # 推送代码时触发
  push:
    branches:
      - main
      - master
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
    tags:
      - 'v*'  # 打 tag 时触发 Release

env:
  PLUGIN_NAME: luci-app-jianguoyun-backup
  PLUGIN_VERSION: 1.0.0
  OPENWRT_VERSION: '25.12'
  PKG_FORMAT: 'apk'
  SDK_URL: 'https://downloads.openwrt.org/releases/25.12.4/targets/x86/64/openwrt-sdk-25.12.4-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst'
  USE_APK: 'y'

jobs:
  build:
    name: Build APK for OpenWrt 25.12
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            file \
            g++ \
            gawk \
            gettext \
            git \
            libelf-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libssl-dev \
            python3 \
            python3-setuptools \
            python3-pyelftools \
            unzip \
            wget \
            rsync \
            subversion \
            time \
            xsltproc \
            zlib1g-dev \
            zstd
      
      - name: Download OpenWrt SDK
        id: download_sdk
        run: |
          echo "Downloading OpenWrt ${{ env.OPENWRT_VERSION }} SDK..."
          wget -q ${{ env.SDK_URL }} -O openwrt-sdk.tar.zst
          
          if [ $? -ne 0 ]; then
            echo "SDK download failed!"
            exit 1
          fi
          
          echo "Extracting SDK..."
          tar --zstd -xf openwrt-sdk.tar.zst
          SDK_DIR=$(ls -d openwrt-sdk-* 2>/dev/null | head -1)
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          echo "SDK directory: $SDK_DIR"
          
          # 验证SDK
          ls -la $SDK_DIR/
      
      - name: Prepare plugin source
        run: |
          # 创建软件包目录
          mkdir -p ${{ env.SDK_DIR }}/package/${{ env.PLUGIN_NAME }}
          
          # 复制插件源码到SDK的package目录
          cp -r Makefile luasrc root ${{ env.SDK_DIR }}/package/${{ env.PLUGIN_NAME }}/
          
          # 显示目录结构
          echo "Plugin source structure:"
          ls -laR ${{ env.SDK_DIR }}/package/${{ env.PLUGIN_NAME }}/
      
      - name: Update feeds
        run: |
          cd ${{ env.SDK_DIR }}
          ./scripts/feeds update -a
          ./scripts/feeds install -a
      
      - name: Configure build
        run: |
          cd ${{ env.SDK_DIR }}
          
          # 设置包格式
          echo "CONFIG_USE_APK=${{ env.USE_APK }}" >> .config
          
          # 启用插件（编译为模块）
          echo "CONFIG_PACKAGE_${{ env.PLUGIN_NAME }}=m" >> .config
          
          # 生成默认配置
          make defconfig
          
          # 验证配置
          echo "Build configuration:"
          grep -E "(CONFIG_USE_APK|CONFIG_PACKAGE_${{ env.PLUGIN_NAME }})" .config
      
      - name: Build plugin
        id: build
        run: |
          cd ${{ env.SDK_DIR }}
          
          echo "Starting build for ${{ env.PKG_FORMAT }} format..."
          echo "Using ${{ env.OPENWRT_VERSION }} SDK..."
          
          # 编译插件
          make package/${{ env.PLUGIN_NAME }}/compile V=s -j$(nproc)
          
          if [ $? -eq 0 ]; then
            echo "Build successful!"
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "Build failed!"
            echo "build_status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
      
      - name: Find package files
        run: |
          cd ${{ env.SDK_DIR }}
          
          echo "Finding package files..."
          echo "Looking for ${{ env.PKG_FORMAT }} files..."
          
          # 查找生成的包文件
          find bin -name "*.${{ env.PKG_FORMAT }}" -type f 2>/dev/null || echo "No ${{ env.PKG_FORMAT }} files found"
          
          # 创建输出目录
          mkdir -p ${{ github.workspace }}/output
          
          # 复制包文件
          find bin -name "${{ env.PLUGIN_NAME }}*.${{ env.PKG_FORMAT }}" -type f -exec cp {} ${{ github.workspace }}/output/ \; 2>/dev/null || true
          
          # 列出输出文件
          echo "Output files:"
          ls -la ${{ github.workspace }}/output/ || echo "No output files"
          
          # 检查文件数量
          FILE_COUNT=$(ls -1 ${{ github.workspace }}/output/*.${{ env.PKG_FORMAT }} 2>/dev/null | wc -l)
          echo "Found $FILE_COUNT package files"
          
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "ERROR: No package files generated!"
            exit 1
          fi
      
      - name: Verify package
        run: |
          cd ${{ github.workspace }}/output
          
          echo "Verifying package..."
          
          for pkg in *.${{ env.PKG_FORMAT }}; do
            echo "Package: $pkg"
            echo "Size: $(du -h "$pkg" | cut -f1)"
            
            # 验证apk包
            echo "APK info:"
            file "$pkg" 2>/dev/null || echo "Cannot determine file type"
            
            echo "---"
          done
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}_25.12_apk_all
          path: output/*.${{ env.PKG_FORMAT }}
          if-no-files-found: error
          retention-days: 90
      
      - name: Show download info
        run: |
          echo ""
          echo "=========================================="
          echo "  编译完成！安装包已上传到 Artifacts"
          echo "=========================================="
          echo ""
          echo "  下载位置："
          echo "  1. 点击页面顶部的 'Summary' 选项卡"
          echo "  2. 滚动到 'Artifacts' 部分"
          echo "  3. 点击 '${{ env.PLUGIN_NAME }}_25.12_apk_all' 下载"
          echo ""
          echo "  或者在 Actions 页面找到本次运行，"
          echo "  在页面底部的 Artifacts 区域下载。"
          echo ""

  release:
    name: Create Release (25.12)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}_25.12_apk_all
          path: release
          
      - name: Prepare release files
        run: |
          cd release
          
          # 生成发布说明
          echo "## 坚果云备份插件 - OpenWrt 25.12" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "**版本**: ${{ github.ref_name }}" >> RELEASE_NOTES.md
          echo "**格式**: APK (新包管理器格式)" >> RELEASE_NOTES.md
          echo "**架构**: all (纯脚本，全架构通用)" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### 安装包列表" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          ls -1 *.apk 2>/dev/null | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "- **$f** ($SIZE)" >> RELEASE_NOTES.md
          done
          
          echo "" >> RELEASE_NOTES.md
          echo "### 安装说明" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "1. 下载 apk 文件到路由器" >> RELEASE_NOTES.md
          echo "2. 执行命令：\`apk add luci-app-jianguoyun-backup-*.apk\`" >> RELEASE_NOTES.md
          echo "3. 登录 LuCI 管理界面，在 '系统' 菜单中找到 '坚果云备份'" >> RELEASE_NOTES.md
          echo ""
          
          echo "Release files:"
          ls -la
      
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: release/*.apk
          generate_release_notes: true
          body_path: release/RELEASE_NOTES.md
          name: "OpenWrt 25.12 - ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
