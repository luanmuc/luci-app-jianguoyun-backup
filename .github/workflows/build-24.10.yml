name: Build OpenWrt 24.10 IPK

# 权限声明
permissions:
  contents: write  # 发布 Release 需要写权限
  packages: read
  actions: read

on:
  # 手动触发
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build Type'
        required: false
        default: 'normal'
        type: choice
        options:
          - 'normal'
          - 'release'
  
  # 定时触发（每周日凌晨2点）
  schedule:
    - cron: '0 2 * * 0'
  
  # 推送代码时触发
  push:
    branches:
      - main
    paths-ignore:
      - '**.md'
      - 'LICENSE'
      - '.gitignore'
      - 'docs/**'
    tags:
      - 'v*'  # 打 tag 时触发 Release

env:
  PLUGIN_NAME: luci-app-jianguoyun-backup
  PLUGIN_VERSION: 1.0.0
  OPENWRT_VERSION: '24.10'
  PKG_FORMAT: 'ipk'
  SDK_URL: 'https://downloads.openwrt.org/releases/24.10.7/targets/x86/64/openwrt-sdk-24.10.7-x86-64_gcc-13.3.0_musl.Linux-x86_64.tar.zst'
  USE_APK: 'n'

jobs:
  build:
    name: Build IPK for OpenWrt 24.10
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            ccache \
            file \
            g++ \
            gawk \
            gettext \
            git \
            libelf-dev \
            libncurses5-dev \
            libncursesw5-dev \
            libssl-dev \
            python3 \
            python3-setuptools \
            python3-pyelftools \
            unzip \
            wget \
            rsync \
            subversion \
            time \
            xsltproc \
            zlib1g-dev \
            zstd
      
      - name: Download OpenWrt SDK
        id: download_sdk
        run: |
          echo "=========================================="
          echo "  步骤 1: 下载 OpenWrt SDK"
          echo "=========================================="
          echo ""
          echo "SDK URL: ${{ env.SDK_URL }}"
          echo "OpenWrt 版本: ${{ env.OPENWRT_VERSION }}"
          echo ""
          
          echo "正在下载 SDK..."
          wget -v ${{ env.SDK_URL }} -O openwrt-sdk.tar.zst 2>&1
          
          if [ $? -ne 0 ]; then
            echo "❌ SDK 下载失败！"
            echo "请检查网络连接或 SDK URL 是否正确"
            exit 1
          fi
          
          echo "✅ SDK 下载成功"
          echo ""
          echo "SDK 文件大小: $(du -h openwrt-sdk.tar.zst | cut -f1)"
          echo ""
          
          echo "正在解压 SDK..."
          tar --zstd -xf openwrt-sdk.tar.zst
          
          SDK_DIR=$(ls -d openwrt-sdk-* 2>/dev/null | head -1)
          
          if [ -z "$SDK_DIR" ]; then
            echo "❌ 无法找到解压后的 SDK 目录"
            echo "当前目录内容:"
            ls -la
            exit 1
          fi
          
          echo "SDK_DIR=$SDK_DIR" >> $GITHUB_ENV
          echo "✅ SDK 解压成功"
          echo "SDK 目录: $SDK_DIR"
          echo ""
          
          echo "SDK 目录结构:"
          ls -la $SDK_DIR/
          echo ""
          echo "=========================================="
      
      - name: Prepare plugin source
        run: |
          echo "=========================================="
          echo "  步骤 2: 准备插件源码"
          echo "=========================================="
          echo ""
          
          # 创建软件包目录
          echo "创建软件包目录..."
          mkdir -p ${{ env.SDK_DIR }}/package/${{ env.PLUGIN_NAME }}
          echo "✅ 目录创建成功"
          echo ""
          
          # 复制插件源码到SDK的package目录
          echo "复制插件源码..."
          cp -rv Makefile luasrc root ${{ env.SDK_DIR }}/package/${{ env.PLUGIN_NAME }}/
          echo "✅ 源码复制完成"
          echo ""
          
          # 显示目录结构
          echo "插件源码目录结构:"
          ls -laR ${{ env.SDK_DIR }}/package/${{ env.PLUGIN_NAME }}/
          echo ""
          
          # 验证关键文件
          echo "验证关键文件:"
          for f in Makefile luasrc/controller/jianguoyun-backup.lua root/usr/bin/jianguoyun-backup.sh; do
            if [ -f "${{ env.SDK_DIR }}/package/${{ env.PLUGIN_NAME }}/$f" ]; then
              echo "  ✅ $f 存在"
            else
              echo "  ❌ $f 缺失"
            fi
          done
          echo ""
          echo "=========================================="
      
      - name: Update feeds
        run: |
          echo "=========================================="
          echo "  步骤 3: 更新 Feeds"
          echo "=========================================="
          echo ""
          
          cd ${{ env.SDK_DIR }}
          
          echo "更新 feeds 索引..."
          ./scripts/feeds update -a 2>&1
          echo "✅ Feeds 更新完成"
          echo ""
          
          echo "安装 feeds 软件包..."
          ./scripts/feeds install -a 2>&1
          echo "✅ Feeds 安装完成"
          echo ""
          echo "=========================================="
      
      - name: Configure build
        run: |
          echo "=========================================="
          echo "  步骤 4: 配置编译选项"
          echo "=========================================="
          echo ""
          
          cd ${{ env.SDK_DIR }}
          
          echo "包格式: ${{ env.PKG_FORMAT }}"
          echo "USE_APK: ${{ env.USE_APK }}"
          echo ""
          
          # 设置包格式
          echo "设置包格式配置..."
          echo "CONFIG_USE_APK=${{ env.USE_APK }}" >> .config
          
          # 启用插件（编译为模块）
          echo "启用插件编译..."
          echo "CONFIG_PACKAGE_${{ env.PLUGIN_NAME }}=m" >> .config
          
          # 生成默认配置
          echo "生成默认配置 (make defconfig)..."
          make defconfig 2>&1
          echo ""
          
          # 验证配置
          echo "编译配置验证:"
          echo ""
          echo "包格式配置:"
          grep -E "CONFIG_USE_APK" .config || echo "  ⚠️  未找到 CONFIG_USE_APK 配置"
          echo ""
          echo "插件配置:"
          grep -E "CONFIG_PACKAGE_${{ env.PLUGIN_NAME }}" .config || echo "  ⚠️  未找到插件配置"
          echo ""
          echo "=========================================="
      
      - name: Build plugin
        id: build
        run: |
          echo "=========================================="
          echo "  步骤 5: 编译插件"
          echo "=========================================="
          echo ""
          echo "插件名称: ${{ env.PLUGIN_NAME }}"
          echo "包格式: ${{ env.PKG_FORMAT }}"
          echo "OpenWrt 版本: ${{ env.OPENWRT_VERSION }}"
          echo "并行编译: $(nproc) 线程"
          echo ""
          
          cd ${{ env.SDK_DIR }}
          
          echo "开始编译..."
          echo "=========================================="
          echo ""
          
          # 编译插件（详细输出）
          make package/${{ env.PLUGIN_NAME }}/compile V=s -j$(nproc) 2>&1
          BUILD_EXIT=$?
          
          echo ""
          echo "=========================================="
          
          if [ $BUILD_EXIT -eq 0 ]; then
            echo "✅ 编译成功！"
            echo "build_status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ 编译失败！"
            echo ""
            echo "错误排查建议："
            echo "1. 检查 Makefile 语法是否正确"
            echo "2. 检查插件源码文件是否完整"
            echo "3. 检查依赖包是否正确配置"
            echo "4. 查看上方详细编译日志定位错误"
            echo ""
            echo "build_status=failure" >> $GITHUB_OUTPUT
            exit 1
          fi
          echo ""
          echo "=========================================="
      
      - name: Find package files
        run: |
          echo "=========================================="
          echo "  步骤 6: 查找生成的安装包"
          echo "=========================================="
          echo ""
          
          cd ${{ env.SDK_DIR }}
          
          echo "bin 目录结构:"
          find bin -type d 2>/dev/null | head -20
          echo ""
          
          echo "查找所有 ${{ env.PKG_FORMAT }} 格式的包文件..."
          echo ""
          
          # 查找所有生成的包文件（详细列出）
          ALL_PKGS=$(find bin -name "*.${{ env.PKG_FORMAT }}" -type f 2>/dev/null)
          
          if [ -n "$ALL_PKGS" ]; then
            echo "找到以下 ${{ env.PKG_FORMAT }} 文件:"
            echo "$ALL_PKGS"
            echo ""
            echo "文件详情:"
            find bin -name "*.${{ env.PKG_FORMAT }}" -type f -exec ls -lh {} \; 2>/dev/null
          else
            echo "⚠️  未找到任何 ${{ env.PKG_FORMAT }} 文件"
            echo ""
            echo "bin 目录完整内容:"
            ls -laR bin/ 2>/dev/null | head -100
          fi
          echo ""
          
          # 创建输出目录
          echo "创建输出目录..."
          mkdir -p ${{ github.workspace }}/output
          echo ""
          
          # 复制包文件（使用更宽松的匹配模式）
          echo "复制插件包文件到输出目录..."
          echo "匹配模式: *${{ env.PLUGIN_NAME }}*.${{ env.PKG_FORMAT }}"
          echo ""
          
          FOUND_COUNT=0
          while IFS= read -r pkg; do
            if [ -n "$pkg" ]; then
              echo "  复制: $pkg"
              cp "$pkg" ${{ github.workspace }}/output/
              FOUND_COUNT=$((FOUND_COUNT + 1))
            fi
          done < <(find bin -name "*${{ env.PLUGIN_NAME }}*.${{ env.PKG_FORMAT }}" -type f 2>/dev/null)
          
          echo ""
          echo "输出目录内容:"
          ls -la ${{ github.workspace }}/output/
          echo ""
          
          # 检查文件数量
          FILE_COUNT=$(ls -1 ${{ github.workspace }}/output/*.${{ env.PKG_FORMAT }} 2>/dev/null | wc -l)
          echo "找到 $FILE_COUNT 个插件包文件"
          
          if [ "$FILE_COUNT" -eq 0 ]; then
            echo "❌ 错误：未生成任何插件包文件！"
            echo ""
            echo "排查建议："
            echo "1. 检查编译步骤是否成功"
            echo "2. 检查 Makefile 中的 PKG_NAME 是否正确"
            echo "3. 检查包格式配置是否正确"
            echo "4. 查看上方 bin 目录结构确认文件位置"
            exit 1
          fi
          
          echo "✅ 包文件查找完成"
          echo ""
          echo "=========================================="
      
      - name: Verify package
        run: |
          echo "=========================================="
          echo "  步骤 7: 验证安装包"
          echo "=========================================="
          echo ""
          
          cd ${{ github.workspace }}/output
          
          for pkg in *.${{ env.PKG_FORMAT }}; do
            echo "包文件: $pkg"
            echo "文件大小: $(du -h "$pkg" | cut -f1)"
            echo "文件类型: $(file "$pkg" 2>/dev/null || echo "未知")"
            echo ""
            
            # 验证ipk包（ar格式）
            echo "IPK 包内容列表:"
            if ar t "$pkg" 2>/dev/null; then
              echo ""
              echo "✅ IPK 包格式验证通过"
            else
              echo "⚠️  无法列出 IPK 包内容（可能是正常的，因为是纯脚本包）"
            fi
            echo ""
            echo "---"
            echo ""
          done
          
          echo "=========================================="
      
      - name: Upload artifact
        id: upload_artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}_24.10_ipk_all
          path: output/*.${{ env.PKG_FORMAT }}
          if-no-files-found: error
          retention-days: 90
      
      - name: Show download info
        run: |
          echo ""
          echo "=========================================="
          echo "  ✅ 编译完成！"
          echo "=========================================="
          echo ""
          echo "📦 安装包已发布到 Releases 页面"
          echo "📍 位置：仓库主页 → Releases"
          echo "🔍 找到：OpenWrt 24.10 最新版"
          echo "📥 直接下载即可使用"
          echo ""
          echo "文件名：${{ env.PLUGIN_NAME }}_24.10_all.ipk"
          echo ""
          echo "=========================================="
          echo ""


  release:
    name: Create Release (24.10)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}_24.10_ipk_all
          path: release
          
      - name: Prepare release files
        run: |
          cd release
          
          # 生成发布说明
          echo "## 坚果云备份插件 - OpenWrt 24.10" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "**版本**: ${{ github.ref_name }}" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          echo "### 安装包列表" >> RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md
          
          ls -1 *.ipk 2>/dev/null | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "- $f ($SIZE)" >> RELEASE_NOTES.md
          done
          echo ""
          
          ls -la
      
      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: release/*.ipk
          generate_release_notes: true
          body_path: release/RELEASE_NOTES.md
          name: "OpenWrt 24.10 - ${{ github.ref_name }}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


  release-latest:
    name: 发布到 Releases (24.10)
    needs: build
    runs-on: ubuntu-latest
    # 所有触发方式都发布最新版（push、手动、定时）
    if: always() && needs.build.result == 'success'
    
    steps:
      - name: 下载编译好的安装包
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.PLUGIN_NAME }}_24.10_ipk_all
          path: release-pkg
      
      - name: 生成发布说明
        run: |
          cd release-pkg
          
          echo "## 坚果云备份插件 - OpenWrt 24.10" > RELEASE_NOTES_LATEST.md
          echo "" >> RELEASE_NOTES_LATEST.md
          echo "更新时间: $(date '+%Y-%m-%d %H:%M')" >> RELEASE_NOTES_LATEST.md
          echo "" >> RELEASE_NOTES_LATEST.md
          echo "### 安装包" >> RELEASE_NOTES_LATEST.md
          echo "" >> RELEASE_NOTES_LATEST.md
          
          ls -1 *.ipk 2>/dev/null | while read f; do
            SIZE=$(du -h "$f" | cut -f1)
            echo "- $f ($SIZE)" >> RELEASE_NOTES_LATEST.md
          done
          echo ""
          
          ls -la
      
      - name: 发布到 Releases（最新版）
        uses: softprops/action-gh-release@v3
        with:
          tag_name: latest-24.10
          name: "OpenWrt 24.10 最新版"
          body_path: release-pkg/RELEASE_NOTES_LATEST.md
          files: release-pkg/*.ipk
          draft: false
          fail_on_unmatched_files: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
