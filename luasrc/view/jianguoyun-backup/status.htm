<%+header%>
<%+header_status%>

<style type="text/css">
/* 坚果云备份插件 - 手动备份页面样式
   深度适配Argon主题，兼容bootstrap、material */

.backup-container {
    max-width: 100%;
    margin: 0 auto;
}

.backup-card {
    background: var(--card-bg, #ffffff);
    border-radius: var(--card-radius, 12px);
    box-shadow: var(--card-shadow, 0 2px 12px rgba(0,0,0,0.08));
    padding: 24px;
    margin-bottom: 20px;
    border: 1px solid var(--card-border, #e5e7eb);
}

.backup-card-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text-primary, #1f2937);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.backup-card-title .icon {
    width: 24px;
    height: 24px;
    color: var(--primary-color, #3b82f6);
}

.backup-card-desc {
    font-size: 14px;
    color: var(--text-secondary, #6b7280);
    margin-bottom: 20px;
    line-height: 1.6;
}

.backup-actions {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.btn-backup {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.2s ease;
    text-decoration: none;
}

.btn-backup-primary {
    background: var(--primary-color, #3b82f6);
    color: white;
}

.btn-backup-primary:hover {
    background: var(--primary-hover, #2563eb);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}

.btn-backup-secondary {
    background: var(--secondary-bg, #f3f4f6);
    color: var(--text-primary, #1f2937);
    border: 1px solid var(--border-color, #e5e7eb);
}

.btn-backup-secondary:hover {
    background: var(--secondary-hover, #e5e7eb);
}

.btn-backup:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    transform: none !important;
}

.backup-badge {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 12px;
    font-weight: 500;
}

.badge-light {
    background: #dbeafe;
    color: #1e40af;
}

.badge-full {
    background: #fce7f3;
    color: #9d174d;
}

.local-backups-list {
    margin-top: 16px;
}

.backup-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px 16px;
    background: var(--bg-secondary, #f9fafb);
    border-radius: 8px;
    margin-bottom: 8px;
    border: 1px solid var(--border-color, #e5e7eb);
}

.backup-item-info {
    flex: 1;
}

.backup-item-name {
    font-size: 14px;
    font-weight: 500;
    color: var(--text-primary, #1f2937);
    margin-bottom: 4px;
}

.backup-item-meta {
    font-size: 12px;
    color: var(--text-secondary, #6b7280);
}

.backup-item-actions {
    display: flex;
    gap: 8px;
}

.btn-small {
    padding: 6px 12px;
    font-size: 12px;
    border-radius: 6px;
}

.status-message {
    padding: 12px 16px;
    border-radius: 8px;
    margin-top: 16px;
    font-size: 14px;
    display: none;
}

.status-success {
    background: #dcfce7;
    color: #166534;
    border: 1px solid #bbf7d0;
    display: block;
}

.status-error {
    background: #fee2e2;
    color: #991b1b;
    border: 1px solid #fecaca;
    display: block;
}

.status-info {
    background: #dbeafe;
    color: #1e40af;
    border: 1px solid #bfdbfe;
    display: block;
}

.empty-state {
    text-align: center;
    padding: 40px 20px;
    color: var(--text-secondary, #6b7280);
}

.empty-state-icon {
    font-size: 48px;
    margin-bottom: 12px;
    opacity: 0.5;
}

.loading-spinner {
    display: inline-block;
    width: 16px;
    height: 16px;
    border: 2px solid #ffffff;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* 响应式 */
@media (max-width: 640px) {
    .backup-card {
        padding: 16px;
    }
    
    .backup-actions {
        flex-direction: column;
    }
    
    .btn-backup {
        width: 100%;
        justify-content: center;
    }
}
</style>

<div class="backup-container">
    <!-- 手动备份卡片 -->
    <div class="backup-card">
        <div class="backup-card-title">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"/>
            </svg>
            手动备份
        </div>
        <div class="backup-card-desc">
            立即执行备份操作，备份文件将自动上传到坚果云。<br>
            <strong>轻量备份</strong>：系统配置 + 插件配置（推荐日常使用）<br>
            <strong>全量备份</strong>：系统配置 + 插件配置 + 插件本体（适合整机迁移）
        </div>
        <div class="backup-actions">
            <button class="btn-backup btn-backup-primary" id="btnLightBackup" onclick="doBackup('light')">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"/>
                </svg>
                立即轻量备份
            </button>
            <button class="btn-backup btn-backup-secondary" id="btnFullBackup" onclick="doBackup('full')">
                <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4"/>
                </svg>
                立即全量备份
            </button>
        </div>
        <div id="backupStatus" class="status-message"></div>
    </div>

    <!-- 本地备份文件卡片 -->
    <div class="backup-card">
        <div class="backup-card-title">
            <svg class="icon" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2h-6l-2-2H5a2 2 0 00-2 2z"/>
            </svg>
            本地备份文件
            <span class="backup-badge badge-light" style="margin-left: auto;">保留最近5个</span>
        </div>
        <div class="backup-card-desc">
            路由器本地存储的备份文件，自动清理旧文件以节省空间。
        </div>
        <div id="localBackupsList" class="local-backups-list">
            <div class="empty-state">
                <div class="empty-state-icon">📦</div>
                <div>加载中...</div>
            </div>
        </div>
    </div>
</div>

<script type="text/javascript">
// 执行备份
function doBackup(type) {
    var btn = document.getElementById(type === 'light' ? 'btnLightBackup' : 'btnFullBackup');
    var statusDiv = document.getElementById('backupStatus');
    
    // 禁用按钮，显示加载状态
    btn.disabled = true;
    var originalText = btn.innerHTML;
    btn.innerHTML = '<span class="loading-spinner"></span> 正在启动...';
    
    // 隐藏状态
    statusDiv.className = 'status-message';
    statusDiv.style.display = 'none';
    
    // 发送AJAX请求
    var xhr = new XMLHttpRequest();
    xhr.open('POST', '<%=luci.dispatcher.build_url("admin/system/jianguoyun-backup/do_backup")%>', true);
    xhr.setRequestHeader('Content-Type', 'application/x-www-form-urlencoded');
    
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
            btn.disabled = false;
            btn.innerHTML = originalText;
            
            if (xhr.status === 200) {
                statusDiv.className = 'status-message status-info';
                statusDiv.textContent = xhr.responseText;
                statusDiv.style.display = 'block';
                
                // 3秒后刷新本地列表
                setTimeout(loadLocalBackups, 3000);
            } else {
                statusDiv.className = 'status-message status-error';
                statusDiv.textContent = '请求失败，请重试';
                statusDiv.style.display = 'block';
            }
        }
    };
    
    xhr.send('type=' + encodeURIComponent(type));
}

// 加载本地备份列表
function loadLocalBackups() {
    var listDiv = document.getElementById('localBackupsList');
    
    var xhr = new XMLHttpRequest();
    xhr.open('GET', '<%=luci.dispatcher.build_url("admin/system/jianguoyun-backup/list_local")%>', true);
    
    xhr.onreadystatechange = function() {
        if (xhr.readyState === 4 && xhr.status === 200) {
            try {
                var files = JSON.parse(xhr.responseText);
                
                if (files.length === 0) {
                    listDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📭</div><div>暂无本地备份文件</div></div>';
                    return;
                }
                
                var html = '';
                for (var i = 0; i < files.length; i++) {
                    var file = files[i];
                    var size = formatSize(file.size);
                    var date = new Date(file.mtime * 1000);
                    var dateStr = date.toLocaleString('zh-CN');
                    
                    var isLight = file.name.indexOf('light_') === 0;
                    var isFull = file.name.indexOf('full_') === 0;
                    var badgeClass = isLight ? 'badge-light' : (isFull ? 'badge-full' : 'badge-light');
                    var badgeText = isLight ? '轻量' : (isFull ? '全量' : '备份');
                    
                    html += '<div class="backup-item">';
                    html += '  <div class="backup-item-info">';
                    html += '    <div class="backup-item-name">' + escapeHtml(file.name) + '</div>';
                    html += '    <div class="backup-item-meta">';
                    html += '      <span class="backup-badge ' + badgeClass + '">' + badgeText + '</span>';
                    html += '      &nbsp;·&nbsp; ' + size;
                    html += '      &nbsp;·&nbsp; ' + dateStr;
                    html += '    </div>';
                    html += '  </div>';
                    html += '  <div class="backup-item-actions">';
                    html += '    <button class="btn-backup btn-backup-secondary btn-small" onclick="downloadLocal(\'' + escapeHtml(file.name) + '\')">下载</button>';
                    html += '  </div>';
                    html += '</div>';
                }
                
                listDiv.innerHTML = html;
            } catch (e) {
                listDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">⚠️</div><div>加载失败</div></div>';
            }
        }
    };
    
    xhr.send();
}

// 格式化文件大小
function formatSize(bytes) {
    if (bytes < 1024) return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    return (bytes / (1024 * 1024 * 1024)).toFixed(1) + ' GB';
}

// HTML转义
function escapeHtml(text) {
    var div = document.createElement('div');
    div.textContent = text;
    return div.innerHTML;
}

// 下载本地备份（简单实现）
function downloadLocal(filename) {
    alert('下载功能：' + filename + '\n\n文件路径：/etc/jianguoyun-backup/local/' + filename);
}

// 页面加载完成后加载本地备份列表
document.addEventListener('DOMContentLoaded', function() {
    loadLocalBackups();
});
</script>

<%+footer%>
